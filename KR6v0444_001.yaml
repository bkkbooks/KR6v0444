body:
  text: 東大寺沙門凝然述夫教山高大雖仰難升法海廣濬雖度難越樹生林鬱是義山之形澐騰魚遊乃理海之德教滿十二部分以大小之衢法越八十千統以相性之畝蘊結西天成四依之所解傳譯東土為三藏之所通隨教立宗竝古今之洪規依義開門皆聖賢之良則印度佛法大小竝行至于其衍門者義淨三藏有言所云大乘無過二種一則中觀二乃瑜伽已上此據性相大途為言顯密化制非無戶牖洎東夏佛法者迦竺為始法天為後其間所傳所立十有三宗各諍蘭菊互奪金玉斯乃大小開路化制分旨空有論疆性相定矩顯密陳相教觀明體淨穢異域三一諍騎至大日本國者弘通佛法由來尚矣八宗分鑣三藏殊歸此亦大小化制之異顯密性相之別而已一一宗教義理難盡今舉精要塵露有同隨宗各拾微塵就門俱滴纖露云爾俱舍宗夫俱舍宗者斯乃阿毗達磨之教簡擇決斷之法也窮性相之可談罄義理之可成諸法實有為宗人無我理為極類相位待顯四說之嘉譽知斷證修示三道之祥瑞七十五法簡為無為之相九十八使定惑隨眠之貌無漏智火燒煩惱之薪有為果光破業縛之暗六識縱橫備自在之德三科任放具殊特之能四十六種居心所有之窟一十四法住非色心之窠根境無表莊色法之臺擇非擇滅造無為之宮四善根之林榮十六行相之枝四證淨之峰峙十五心見之岩三十七品是入聖之階陛四十八行亦證果之門路信法二行彰利鈍之殊慧俱二脫陳機情之異向果四級獲內行於一心三明六通窮實德於單意三十四心證佛果之由漸十八不共異餘聖之別德向果位多應供是極也三乘道異寂滅即同俱舍論中具明法義然此一論意致有由顯述有宗之義密朋經部之理良以世親論主事無偏黨意隨優長取捨在兹故也凡此論宗一部九千頌譯成三十卷雖有顯密正述有宗具攝婆沙妙義隨括六足幽旨四含契經盡彼義門二持毗奈窮其理路玄弉三藏唐朝重譯光寶二師敷演絶倫泰暉兩英宣通有功至弘通日域者初傳之緣無所記録然與法相宗同時傳度彼宗學者兼帶習之故延曆十三年官符稱俱舍付法相宗云云雖有兼帶學者別多雖學通諸處各玩芬郁而東大一寺依學甚昌絶倫之哲多在此寺拔群之匠皆出今砌古來繼續敢無廢替中比有四英覺澄貞禪義海乘信各立義鋒互叩金石近比有兩哲良忠聖禪俱積螢雪玉鏡奪光當代有二英快圓定春而已此亦智海濬濬竝為秀逸圓公位在擬講墮無常焉春公階升法印久保惠命門林鬱茂數敷繁多自餘碩德數非一焉俱舍義旨塵露如此成實宗夫成實宗者如來滅後九百年中有訶梨跋摩是薩婆多宗鳩摩羅陀弟子也慨師所解近在名相徙轍僧祇大小兼學鑽仰九經澄汰五部再卷邪霧重舒慧日遂造此論大陳妙義一十六卷或二十卷二百二品四諦建章五聚明義四含妙理蘊在此論之中三藏實義積居今典之內人法二空是理實義色香味觸乃事實義然則二十七賢聖有學無學相分三十七道品因人果人同修泯三諦而歸一滅遺諸有而入一無二空之月朗于義天雙翳之雲晴于理虛四塵成四大同雨衆之所談四大生五根契毗曇之所說拂三心妄念見一性之體卷十相計著顯二諦之相五方便之門泯二心之諸執四現忍之路觀三世之五陰一時見諦之室智燈光明多心入理之床覺風息濡無相之峰榮假有之林法空之谷流絶言之水盡無生之果拂法執之塵灰身滅之證叩涅槃之窗所說入玄覺是大乘之極所解居幽疑即上衍之妙三大法師梁朝立全大之稱天台嘉祥陳隋成唯小之義譯在弘始羅什即其人講始姚秦僧睿是彼匠自爾已來一天皆鑽仰四海咸朝宗講通相繼敷演互昌龍光光宅義照九霄白馬開善悟導三江震旦惠影遺妙疏於後昆百濟道藏留要釋於來葉諸餘英哲著撰非一弘傳日域無所具録三論諸師兼學通旨乃延曆十三年官符稱成實論付三論宗云云昔於元興寺大弘此宗後遷東大寺連續習玩近來學者玩三論者無不兼通即其謂也當代英匠定春等碩俱舍飛名三論流譽因明窮旨兼研成實通包之能敢無對者成實宗旨要略如此律宗夫戒律宗者防非止惡之教修善成德之法也三學初基定慧由此生長五乘元址報果為此感成建興佛法專藉毗尼之力住持遺教啻在尸羅之功身口之𠎝觸戒力而忽喪意地之塵中凉風而早散止作淨戒為宗行德果證為趣戒行繁廣精要有二一止持戒二作持戒禁防制御事成止門構造策修法在作門單持隻犯之園莊飾非一雙持雙犯之林枝條是多教行雙持制身口之綱格心用雙持攝意業之軌範曇無德部為所依之本四分律藏為所通之源分通大乘遙超有部意致卓朗易入圓宗道宣律師為其高祖判教攝法建立一城一代典籍判為二教化教惣攝經論行教唯歸律藏又陳述戒體惣立三宗有宗則毗曇諸論空宗則四分成實圓教則大乘極典終窮常住祖師意致教弘四分宗在圓教法華涅槃攝大乘等所受戒法歸入圓宗熏本識藏成善種子是故戒體萬行本源三聚圓成三身圓感斯乃南山之峰受隨風濡西湖之里戒律月明圓宗之門立三聚之車唯識之池浮四位之船二百五十禁戒盛三佛果三千八萬威儀牽四德體聳聳調伏之德滿戒瓶而不破巍巍尸羅之威戴律冠而無及一戒三智之嵐掃於二障之境塵三學兩持之蕚開于五根之心池五篇七聚自和大海一味三聚十重即顯高山三德實是諸佛出世之元意衆生成佛之直路斷惑證理之本源濟物利生之妙則唯此戒律頗罄旨歸者也昔姚秦傳大律元魏講本藏其後祖祖相承燈燈互照如來是開法導師迦葉乃傳持初首乃至掘多五師任持掘多之下橫有五師是五部之首諸宗之源也曇無尊者四分律主曇摩迦羅傳之漢地法聰是三祖道覆為第四次慧光次道雲次道洪次智首次道宣名之九祖至終南道宣者秉持第一弘演甚昌著撰非一舉世行用次有周師次有道恆次省躬次會正法寶元表守言無外法榮處恆擇梧允堪擇其元照自南山至照公經十五代弘通甚繁元照律師多釋祖文元照門下有智交道標兩德惟一即承二師次法政次法久次妙蓮次行居自照公下乃經六代自南山取之成二十一世行居律師當于日本弘長文永之曆住持寺院弘通律法震旦戒律弘通如是至日域戒律者昔天平勝寶六年甲午鑒真和尚越海來朝建壇授戒律法行世左京於東大寺立戒壇院開唐禪院右京建招提寺大弘毗尼自爾已來律法大敷戒壇唐禪付與法進大僧都師資相承傳持戒法唐招提寺付如寶少僧都寶載義靜等彼彼律匠各生門輩互窮學業如寶弟子有豐安僧正安公之下有道淨律師等乃至後代相承不絶鳥羽天皇御宇實範大德作戒壇式更興律法也順德天皇御宇笠置貞慶上人重興律藏戒如大德承之講敷學侶相競律燈非一乃覺盛圓晴睿尊覺澄繼尊禪慧等也四條天皇御宇嘉禎二年丙申覺盛圓晴睿尊等四人祈請好相自誓受戒即菩薩三聚通受之法也戒行法則如說修行此時再興舉世投之厥後乘心良遍真空聖守圓照證玄等竝稟覺盛和上焉忍性唯心寂尊惣持盛遍信空等皆睿尊律師之門人也禪惠大德稟戒圓晴後重受于覺盛上人焉當代律德忍空真照等乃圓照上人門侶也招提真性等是證玄大德入室也順德天皇御宇俊芿法師越海入唐傳律歸朝北洛東山開泉涌寺講敷律藏定舜闍梨繼踵開講學侶多般各達戒宗乃智鏡思允元承俊芿道元淨因也智鏡入宋大傳風芳覺阿承律智鏡淨因兩德司泉涌寺昌興律藏真照入宋謁妙蓮行居受戒咨律歸朝之後移住泉涌寺隨于思允問律習法忍空真照隨于淨因習學律部日本律宗弘傳如是法相宗夫法相宗者大乘滿字之教中道甚深之法也循環研核為了義之極決擇分明是諸法之上六經十一部論為所依三性三無性為所明解深密經特為本源瑜伽大論專為憑據唯識為宗中道為相識有五重是所觀之境體出四階乃能解之規四重諦之下運不念之念四分心之上緣非境之境外境本無之虛心天是清內識森羅之林覺園即鬱攝機有五性授教立三乘無漏之種分具不具之異出世現行有生不生之別加之定性二乘永絶三佛之果菩薩種性直升四德之位一乘是密意之施設三衍即真實之了談三乘趣果有五重之級一實到佛分六階之差四弘誓願是所發之心三大僧祇為所經之劫五重三性策觀解於自行三檀四攝勇善巧於利濟練磨驚覺之鞭進欲退將轉之馬尋思如實之風掃所取能取之塵真見之火直觸真理之膚相見之水遙現相分之影踏十地之梯運十度之步卷十障之霧顯十如之月萬行已滿升正覺之山二利已成入涅槃之宮法身自用之體窮實際於自證化用變化之德盡應用於他利十八圓滿之相飾深密之珍殿二十一德之體啓佛地嘉會四智心品之大海揚無竭之洪浪三身圓德之高山扇靡窮之清嵐實是法義深奧之宗理致幽邃之教者也彌勒菩薩佛世親聞滅後九百降下說之無著大士繼踵宣揚世親論主踏跡弘敷護法菩薩傳持開演戒賢論師流通不絶餘諸論師傳持甚多至震旦國中弘傳法相者玄奘三藏遠往即度遇戒賢論師受學法相東西往還十七箇年耳目見聞百三十國遂還唐朝昌弘此宗門徒三千達者七十昉尚光基上足四英入室一般唯推基公基師之門有淄州慧沼沼公之下有撲揚智周潞府義忠大唐法相如此相承橫竪弘通後代甚昌然則輸闍那堂之靈光遙照沙界那蘭陀寺之芬芳久傳塵剎源潔流遠是阿輸闍國之餘潤根深枝茂亦大慈恩寺之遺葉者也至于大日本國弘通事者傳之此國惣經四代初則孝德天皇御宇道照和尚往唐稟于玄奘三藏歸朝弘之次則齊明天皇御宇智通智達往唐承于三藏還即弘之三則文武天皇御宇大寶三年癸卯新羅智鳳智鸞智雄三師入唐乃承撲楊大師還即弘之四則元正天皇御宇靈龜二年丙辰玄眆法師入唐承之撲楊大師在唐學法經二十年至聖武天皇御宇天平七年乙亥七月歸朝大弘所傳四代連綿各傳宗教一味和通無有別異而智鳳門葉經世甚昌鳳鸞二師俱授法于義淵僧正淵公有八人高足乃玄眆僧正行基菩薩宣教大法師良敏大僧都行達大僧都隆尊律師良辨僧正定照大德也道慈亦就學然入三論宗此等諸德各生門葉俱開義理橫竪弘演且宣教下有賢璟大僧都璟授明福少僧都次延寶已講次空晴僧都次真義僧正疇公四人高足之一次林懷大僧都次主恩大德次永超僧都次湛秀已講次覺晴大僧都次菩提院藏俊贈僧正俊公隨諸德普窮義門矣次覺憲僧正憲公授于貞慶上人本是已講慶公學秀千古德光萬代門輩列林聽徒成市獨步二明唯是而已慶上人下有圓玄大僧正覺遍權僧正璋圓大僧都良算法師等圓玄門下有經圓法印專英法印兼本經圓圓兼法印等圓實大僧正承于經圓專英下有實懷僧正公信法印等圓憲下有宗懷僧正覺遍下有良遍法印貞弘律師緣圓大法師等良遍下有賢恩已講兼稟覺遍恩下有尋賢大法師猷賢法師等貞弘下有實寬法印行寬法印憲弘法師英禪僧都亦稟專英英玄範憲法印亦稟緣圓等緣圓下有訓實大法師緣憲法師幸繼法師亦承幸憲等璋圓下有堯憲律師寬專法師等良算下有實算大僧都緣圓亦承良算法相一宗上古已來學者極多不可具録且舉少分示相承事自外近來積學之者勝詮僧都教允律師順高大僧都良盛僧正英玄大法師定真大法師承于勝詮玄雅僧正稟于定真承範法印教允弟子良繼法印順高弟子源範得業承于良盛定真辨玄僧都英玄弟子靜兼僧都兼範得業承于英禪弉實得業辨玄弟子如是等哲群出甚昌後菩提山大僧正尊信稟于圓憲專英大乘院大僧正慈信稟于宗懷訓實奘實師資傳芳研精絶倫竝是三國血脈之貫首一天秉御之長者也法相大乘梗概如是三論宗夫三論宗者無依無得之教中道正觀之法也盡邪謬之可破窮正道之可顯法無邪正無可破顯無破顯故無有所住有邪謬故有可破遣對破邪故有其顯正然則四見邪道執著之雲實厚三玄外宗妄情之霧是深偏計之小乘徒留安意之窟有相之大人虛住寄心之宅有執皆遣無相之風是涼無著俱收無方之月即朗邪開四宗所破之相皆盡正分二門所顯之法斯窮體正是言思道斷之晴天用正即緣生假有之星象真際無動建諸法而宛然假名豈壞說實相而寂爾一念成覺深宮三身果滿三祇積行之長路六度因圓元來是佛床上六趣衆生皆升本自寂滅窗內一切有情咸入有非有故有自元無所有空非空故空從本無所空諸法實相言亡慮絶泯一切門終歸一相一相亦無此無無寄不知何名強名無得有著既皆遣遣而無所遣若無所住一言即見若有所著隨著遣之四句所以而呵百非由此而而考而恐衍遣四句百非皆亡此亡亦隨泯亡然後不生之園開森然之華無依之林榮歷焉之樹八不正觀之峯無念理明四中任放之原作用事鬱四種釋義照萬法之靈玉三種方言見二諦之神鏡二藏構太攝釋尊八萬之法財三輪巧麗安善逝五千之教珍文殊大聖是在世之親聞馬鳴龍樹乃懸許之妙記提婆論師摧外道於王庭羅睺大士導品物於人都三論東傳弘之龜兹沙車王子鑽仰化世于時羅什年始十六稟法王子通達幽旨此時佛滅後一千二百八十五年也什公更遊五天久習諸教還來龜兹大弘所傳齡至六十三東晉第九主孝武帝之世來在涼州厥後經十九年即到姚秦之朝乃弘始三年齡八十一也其後翻傳三論宣譯諸教門徒三千達者七十八宿竝肩敷揚三論道生大師即其之一生公之下有曇濟大師次道朗次僧詮次興皇寺法朗大師次嘉祥寺吉藏大師竝慧均僧正也嘉祥大師製三論疏釋諸經論三論義門一宗教章建立周備次斷整具遐方仰為宗家終古崇為高祖法朗大師訓生二十五哲藏公其之一藏公下有五英乃智凱知命智實寂師慧遠也大唐後代弘敷三論竝是嘉祥門葉而已至日本三論者由來尚矣昔推古天皇御宇高麗惠觀僧正入唐承宗嘉祥大師即傳此國在元興寺本元興寺至孝德天皇御宇即請慧觀令講三論觀公授于福亮僧正亮公授于智藏僧正藏公入唐重傳三論歸朝弘通藏下有道慈律師智光禮光等道慈入唐廣學六宗三論為本歸朝之後建大安寺大弘論宗是故三論即有三傳日域佛法最初傳三論次傳法相次弘華嚴次傳禪宗次傳律宗次傳天台最後傳真言教善議勤操安澄寺諸德皆大安寺即道慈門葉也智光禮光住元興寺弘通三論智光下有靈睿次藥寶次願曉律師曉公授于聖寶僧正寶公弘之東大寺即立東南院為三論宗永代本處遐世繼續任持不絶故司彼院務之人乃為三論貫首即聖寶僧正延敒僧都觀理權大僧都法緣律師澄心僧都齊慶律師有慶僧都慶信法印覺樹僧都惠珍僧都聖慶得業道慶得業勝賢僧正唯密宗也定範法印道快僧正聖實權僧正聖兼大僧正聖忠大僧正如是相繼經十八代院務次第成師資儀若依受法事有不爾法圓考圓恐緣澄心俱承觀理勝賢不稟先師等也聖寶下有延敒次觀理次澄心法緣澄心下有有慶次慶信顯真真公下有永觀律師慶信下有覺樹圓快等樹公下有珍海已講重譽上人觀嚴大法師等珍海下有敏覺法印次明遍僧都次慧敏貞敏僧都貞敏下有貞乘僧都貞禪大僧都貞玄律師等貞禪下有聖基僧正道寶僧正快慧得業等圓快下有理真律師樹朗已講等理真下有賴慧法印定範法印道慶得業秀慧擬講重喜律師等秀慧下有覺澄阿闍梨信禪已講等重喜下有義海得業乘信僧都樹慶得業等乘信下有定親僧正定兼律師等定親下有定濟僧正兼承乘信樹慶下有道快僧正智舜法師等舜公下有快圓已講定春法印良秀律師等道快已後師資相承即如院務次第亦隨餘人受學宗旨聖兼承于快圓聖忠亦爾亦承定春等三論學者古來極多列其少分顯弘傳相三論精髓取要如是天台宗夫天台宗者圓融無二之教開顯唯一之法也判八萬教有四教之門精五千典以五時之節四教開兩途盡化儀化法之相五味分二番窮前後始終之事光照高山彰融不融之法雨潤大地示但不但之化方等嘉會普施四教之寶般若妙場唯與後三之珍頓漸化儀是四味之調熟純圓開顯乃醍醐之上藥藏通兩教三乘竝駕而運別圓二門六位列乘而行次第觀之空懸雲外之月圓融諦之天見普照之光十如實相之峰性相之風大扇三諦相即之谷空假之水清流一心三觀之智火早盡三惑之薪一念三千之理海高騰十界之浪三十七品助道之宅修習事廣四十二重中道之宮見證理靜三身即一顯正報之大果四土不二陳依報之妙域方便之教立三車於門外真實之義授一牛於露地三乘五乘皆到大覺之寶都七便九界悉入圓融之靈宮超爾前之八教靈山獨秀和常樂之一味堅林亦麗十妙開本迹俱敘大事因緣三觀分融隔總彰別圓之差異十法成乘之船度初隨喜之者一重金剛之騎導最後品之人常寂光土是娑婆之內冥合法身豈應化之外性具妙如之園中萬象本備修德顯現之林間千門新生不變常住之栖物我元一緣起恆爾之家構作是萬開示悟入通住行向地之路止觀明靜莊空假中道之室如來藏之玉在三惑纏之裹觀行即之鏡浮五品人之影初住閣內斷無明之力早顯妙覺臺上證中道之德已窮初後不亂之地橋六重之樓觀生佛無異之庭栽一融之樹草平等圓滿之道無過此教甚深究竟之宗豈有加者乎昔北齊尊者開一乘門修習法華三昧之法陳朝南嶽禪師稟風毗贊佛乘傳光獲得根淨陳隋二代天台大師修證五品具足十德樂說靡窮演暢無盡四教五時廣播芳芬百界千如大彰祥瑞天台授之章安安公下有智威次惠威次玄朗次荊溪湛然尊者記述廣施通演甚昌荊溪之下有道邃道暹智度行滿元皓等橫竪弘傳燈燈甚多行滿下有廣修次物外次梁元琇次周清疏次宋義寂次四明義通次四明知禮尊者次廣智次神智如是等血脈相承于今不絶至日本國天台宗者昔天平勝寶六年甲申大唐鑒真和尚與戒律宗同時傳之而講敷未廣徒送年序延曆季載傳教大師越海入唐隨道邃行滿受學此宗大傳章疏歸朝弘之比睿靈峰廣敷宗教入唐已前隨鑒真所傳講敷部文弘演有功況入唐之後大布四海傳教門下有義真圓澄光定慈覺大師等慈覺門下有慧亮和尚亮公下有常濟阿闍梨濟公下有承哲惟尚二德二公門下有理仙仙公授慈慧良源僧正慈慧門下有源信僧都覺運僧正山門宗義只是兩門也乃惠心檀那兩流也源信門下有覺超僧都次勝範座主次長教阿闍梨次忠尋座主次梠生皇覺次範源法印次俊範法印次靜明法印經海僧正也覺運門下有遍救僧都次清朝法橋次隆範阿闍梨次澄豪律師次永辨法印智海法印長耀法印等永辨門下有證真法印次聖覺法印宗源法印隆澄律師等猷豪法印承詮法印俱承隆澄也雲快僧正信承法印宗澄法印經承法印竝受于宗源也智海門人有明禪法印次顯愈法印次經海僧正海本承明禪也公豪僧正承于明禪豪授之實禪大僧都近代碩德永辨智海而已長耀門人有顯真僧正靜嚴法印顯真下有仁快大僧都圓能法印聖覺明禪等顯愈亦隨禪公受於此流愈公下亦有經海也圓能下有智圓法印證圓闍梨焉智圓亦稟證圓宗源承于仁快源下有雲快快下有經承顯雲承詮宗澄法印憲源法印也顯雲僧正亦承于承詮焉學者極多不能具列上古慈覺智證中古惠心檀那下古永辨智海次靜嚴竹林房證真寶地房近則智圓信承經海靜明猷豪承詮等也山門天台弘通如此彼園城寺是智證門人名之寺門天台其相傳者智證大師承于義真座主智證圓珍門下有增命僧正次鴻譽內供次運昭內供次千觀內供次慶祚阿闍梨次明尊大僧正次智圓闍梨次元範次範守次良明闍梨次圓憲闍梨次良慶法眼次長舜法眼次明元法橋祐曉律師次實伊僧正也明元下有審基僧都次仙真闍梨次俊幸竪者等也寺門天台雖有數流一流相承取要如是天台一宗都鄙廣傳延曆園城是其本處而已華嚴宗夫華嚴宗者毗盧遮那之靈府普賢菩薩之祕旨也寂寥虛曠泯名相於筌蹄之表冲精幽漠絶形言於視聽之外五目天隔窺窬六通遠離測度果分之都佛佛豐平等之證正覺之邦聖聖圓自在之智非教誘之所得匪根宜之攸測絶絶離離不可得而稱然因人機發則現嘉會之應圓士根熟則示運啓之化普賢彰受教之首文殊作領旨之主故海印炳焉浮森羅之影高山鬱鬱榮無盡之林二七之朝創開最極之政三十之夕正播精奇之務七處九會遍法界而廣說三十九品經虛空而大演盡十方而不極包三世而靡休教主則十身具足之果人聽徒則六位圓備之因士括體用於三種之世間貫業德於衆妙之階級能詮是廣大通方之文入微塵寥寥所詮乃鎔融相即之旨住纖毛廓廓性起隨緣之法滿于森然之空無性似有之事鬱于炳焉之地言語泯絶無彼此之門形名虛玄混大小之相緣起無性不礙如理之體無性緣起無妨恆沙之相法性融通成纖塵包遍之德緣起相由顯一毫攝通之業萬法同時應一法之門千差涉入窮微密之戶一即多而不森多即一而弗單微細安立之家萬象炳然而現祕密隱顯之室諸相歷焉而立帝網重重互影之相無盡主伴圓圓相具之義整足三際十世遍攝無窮八方諸剎普包靡遺一塵同時具四法界諸法皆有其相亦爾舉一全收之義本無孤法立此盡彼之事諸門圓滿衆生一心本具此相佛果體德彼此無別心佛衆生三無差別圓融相即無礙自在十身整備三大滿足本來自爾遍攝周盡法界理實緣起因果為宗十玄六相無礙圓融為義三生成佛天超餘教之表十佛滿覺遠出衆典之外前身見聞成金剛之種現報解行圓賢聖之位四勝身之春花薰匂於勝義之天一生報之秋月浮影於果性之海五周因果之說攝萬有於七字之內六位行證之談盡諸門於九會之中道成之樹榮六度之大枝逝多之林結十佛之覺果普光法堂運信足於種智之路寶莊嚴殿極勝頂於圓滿之空天子喰豉窮十地之位善財詢友盡六重之階文殊妙智之門導萬行於寶所普賢深理之堂證一如於心性一乘妙益頓圓難測別教普周盡極在兹華嚴宗旨精要如是十佛覺滿陳自證於道樹一乘緣熟獲解益於法界普賢文殊恣加說於法會馬鳴龍樹任弘通於懸記堅惠論師造雅釋於六會天親菩薩製妙論於十地至傳譯震旦者東晉之世覺賢三藏創譯本經大行于世大唐之代實叉難陀重翻具本廣利於物昔隋代燉煌杜順帝心尊者講經弘法大布一乘即文殊之化身也至相寺智儼尊者繼踵弘揚魏國西寺法藏賢首菩薩研核精詳廣滿四海清涼山澄觀華嚴菩薩依用鑽仰高張教網圭峰宗密定惠尊者稟承奉持騰化一天後代諸師投華嚴者無不皆從此蹤弘持然則五教林廣榮八萬之大樹十宗園大鬱五千之瑞果或開三重觀勸機或緣六相義獲證四種法界開心塵見之十重教體舉念慮顯之六義因門親辨自體十玄緣起圓攝法界果性海上息回旋往復之浪因緣山中開大樹上草之華海印三昧現萬象於一念如來性起示十門於一塵華嚴何處全己體在近法界何物指纖塵不遠震旦華嚴講敷流通橫竪相繼血脈無絶至日本華嚴者昔聖武天皇御宇天平十二年庚辰十月八日良辨僧正請大安寺新羅大德審祥禪師於金鐘道場東大寺羂索堂講華嚴經厥後諸德相繼講敷不絶審祥禪師是講法之始祖良辨僧正乃興宗之本願俱學解深廣精詳究盡也良辨之下有實忠和尚次等定大僧都次正進律師次長歲和尚次道雄僧都次基海大德次良緒律師次光智大僧都東大寺者惣弘諸宗華嚴為本滿寺皆爾本願僧正意致爾故光智建尊勝院別為華嚴本處故司院務之人即宗之貫首也光智下有松橋已講次延幸律師次深幸法橋次定暹大法師次隆助法橋次辨曉法印曉公紹隆一宗建興二諦次道性法印次良禎僧正此據院務次第若據受學道澄光曉有功次宗性僧正受學亦是道澄光曉性公解秀千古學照萬代華嚴因明俱舍究賾相宗空論性宗罄奧次宗顯法印次公曉大法師受法即是宗性僧正此是嫡嫡相承次第隆助下有慶俊法師探玄本記作鈔舉疑辨曉從之學法辨曉門下有尊玄僧都教寬擬講尊玄下有聖禪僧都禪公俱舍究賾因明通旨圓宗盡奧遐世規矩禪公隨高山喜海練磨宗教教寬下有尊詮得業延真得業真下有承性大法師性公下有良忠大法師忠公學明俱舍與聖禪竝肩金玉競光蘭菊爭色通達圓宗建立義途宗性之下有實弘法師研究宗義兼隨喜海學習法義俱舍解義亦盡幽旨光智門下有觀真律師次觀圓已講次延快已講次勝暹已講次良覺大法師次景雅法橋雅公下有聖詮法眼近代北洛西山高山寺高辨上人隨景雅學華嚴隨聖詮習俱舍辨公講法本寺弘宗高山內行得證外業播德厥時天下貞慶高辨南北二京各獨步耳聖詮下有藏圓僧都通達圓宗俱舍得旨法華究義弘光宅疏高辨下有喜海道澄定恩靈典圓辨隆詮長辨高信顯晉淨辨證定了辨等道澄住東大寺自餘諸德或居高山或住神護各弘所宗喜海下有靜海辨清等又定恩靈典等皆兼聽喜海講靜海下有照辨順辨等永辨初聽喜海講後承靜海矣辨清下有經辨等高信下有辨深順高等辨深下有弘辨高信已下丹州弘宗高辨已後大分一燈如是橫竪弘通傳敷古來義學橫竪甚多今舉精要陳弘通相而已真言宗夫真言宗者最極祕密之教究竟深奧之乘也體性玄漠超思議之表相用微妙出測量之外聲聞緣覺遠絶見聞十地等覺天隔窺窬顯乘極果猶未入室諸教幽致豈得升堂最上祕祕極尊密密然則六大周遍泯情非情之異四曼貫括亡捨不捨之別兩部分堺彰靡窮之德三密殊畝恣無限之用金剛之臺耀惠光而朗朗胎藏之都孕悲水而潤潤三十七尊捧智印於心城四重聖衆榮理華於身苑九會曼荼之體包諸法而不遺十三大院之相攝群乘而無外皆是毗盧遮那之全身竝乃大日遍照之即體如實知心罄無始之邊我覺不生窮本初之際三妄雲晴華藏之天彌高五智光照密嚴之鄉太明教主則兩部不二之尊作萬德正覺之王法門則三密極一之上為諸教冲玄之首理身自用豐內證於深密之宮變化等流顯外用於雄宏之門生身證覺感悉地於現報之中即座發悟極果位於剎那之間心續生之路建亭舍而蘇息金剛宮之內出寶財而受用衆生本有之曼荼徒沈我執之泥嬰童始發之善心僅至人天之階唯蘊無我之車致運載於三界之外拔業因種之城作止息於二滅之裏他緣大乘之月落五乘之水覺心不生之風拂八妄之塵一道無為之里遮照之計洋洋極無自性之域融即之政巍巍此等皆是遮情之門不入自寶表德之殿若見自心萬法非他若開內庫衆象我有故祕密莊嚴之奧堂積本有之諸寶最上妙飾之重閣滿元來之衆珍橫平等之門竝十界而無方竪差別之戶精千級而有在現智一對騰羽翼於法界之蒼天空有二雙運輻輪於華藏之坦地自證之智海湛本性深濬之水化他之悲山鬱善巧救濟之林正法輪身與隨機攝化之益教令輪者播大降魔怨之威心王大日如來之體心數剎塵諸聖之相括囊萬差而歸一揆包貫千殊而泯二途因位別德是四維之士果滿異相乃四方之覺因門成滿果位圓備統之以中臺仰之以最頂名之毗盧遮那號之萬德覺王大三法羯遍通諸法身語意密收攝一切色心依正皆真言之妙有情非情悉密法之奧至真實之寶所窮上位之靈居唯此乘教罄其幽致密宗大綱精髓如此金剛乘教大日如來之所說金剛薩埵之所傳龍猛菩薩稟此弘持龍智大士習此演敷至傳大唐國者開元四年丙辰善無畏三藏始屆長安翻傳密教弘之遠近無畏即承龍智大士次開元八年庚申金剛智三藏始入唐朝弘通密教剛智亦稟龍智菩薩不空三藏亦隨來唐剛智滅後亦往南天承于龍智歸朝弘通一行禪師隨善無畏傳受密教亦承于金剛智三藏也不空門下有惠果大師受學傳持大播芳譽大唐真言橫竪弘演燈燈相照不能具陳至日本真言者昔桓武天皇御宇延曆二十三年甲申弘法大師越海入唐隨青龍寺惠果阿闍梨受學密教大同元年丙戌歸朝厥後大興真言廣敷密乘門輩數多皆弘密教乃實惠真雅真濟杲鄰等真雅僧正授之源仁僧都次聖寶僧正次觀賢僧正次淳祐內供次元杲僧都次仁海僧正次成尊僧都次義範僧都次勝覺權僧正次定海大僧正次元海僧都次實運僧都次勝賢僧正次成賢僧正次憲深僧正次定濟僧正等如是相承也然真言教日域所弘門流極多燈炎非一古來諸惠有異傳故義途有別立門輩故昔傳此教惣有八家一睿山傳教大師往大唐國隨順曉阿闍梨傳受密教歸朝弘之二高野弘法大師上來所陳三睿山圓仁慈覺大師承和五年戊午往唐遇全雅元政義真法全等傳受真言四靈巖圓行和尚承和五年入唐遇青龍寺義真阿闍梨習學真言五安祥惠運和尚承和九年壬戌入唐承傳義真六小栗栖常曉和尚承和五年渡唐隨文璨阿闍梨傳受真言七睿山圓珍智證大師仁壽三年癸酉渡唐隨法全阿闍梨習學真言八圓覺宗睿和尚貞觀四年壬午入唐遇玄慶和尚法全阿闍梨習學密教雖有八家不過二門五家是東寺三家即天台也圓行是杲鄰弟子惠運即真雅弟子宗睿是真紹弟子紹公承于真雅等皆是弘法大師門葉弘法所傳惣名東寺真言睿嶽所傳惣名天台真言天台三家後代昌弘啻是慈覺智證兩流而已慈覺所傳永弘睿嶽智證所傳即移園城延曆園城所弘真言各分小徑門流非一恐繁不陳東寺真言源仁之下惣分二流聖寶是小野流之源益信乃廣澤流之源也小野流中成尊之下亦分二流義範是醍醐流範俊即勸修寺醍醐寺中勝覺之下聖賢是金剛王院賢覺是理性院勝覺即根本名之三寶院定海元海等相承而來如前具列廣澤之流後代亦昌寬平法皇受法于益信僧正法皇御流有寬空僧正次寬朝僧正次濟信次性信次寬助次覺法次覺性次守覺次道法次道助次法助等多是王子法親王焉如是嫡嫡傳持而來廣澤真言橫竪弘演其人亦多法皇御流一味洞明而隨緣宜橫分諸流乃成就院華藏院忍辱山常喜院亦名觀音院保壽院等也喜多院即是御流汪洋冲玄淳源均平真言教法建立巧妙一城之內萬法究盡唯是高野大師東寺真言而已上來所陳八宗如是日本佛法大小顯密性相化制自昔所弘此數而已斯乃或應公請或致決擇或勵其學業或整彼行儀傳法之師奉詔蒙宣弘敷天下流演海內如是傳通者自古已來只有八宗以為規矩非此例者事義非無即是禪宗淨土二門雖非八宗之例而亦所立多端今即編列各陳梗概彼此惣合成十宗焉然禪法一門昔天平年中已傳此國二三代後不聞弘傳中古一括入唐習禪自耀炎光不及弘通近世諸德多傳禪法或自宋來朝或從此往還諸方歸投演流甚昌淨土教門通在諸宗諸宗各兼未為別宗近世源空上人立為一宗勘一流師承為一墎指南從爾已來天下皆行典籍繁廣講學甚昌禪宗夫禪之為法也其旨大矣哉欲言難陳欲思叵測不可是寄形色而示豈可翰墨之所録哉縱有述宗是強陳也見月廢指得意忘言不得已者亦古賢道法體冲邈可謂自心精妙幽漠玄寥奧邃萬法虛寂諸物非有妄念元無塵境本絶絶無之心靈知不昧不昧之體即清淨心心本自知不籍緣由元無煩惱即是真無本是菩提即是真知生佛絶離惑智泯亡非待對之門出往復之路泯絶亦泯其處幽賾當知離真妄之真是真實真絶生佛之佛即真實佛以心傳心非簡牘之所録以知見知非筌蹄之所表直指人心見性成佛是故不立文字名句不同餘宗義門森羅理性炳焉頓顯事用繁爾廣施任放自在嘗無所寄大師釋尊以此妙心傳大迦葉以為始祖次阿難次商那和須次優婆毱多次提多迦次彌遮迦次婆須密次佛陀難提次佛馱密多次脅尊者次富那耶闍次馬鳴次迦毗摩羅次龍樹次迦那提婆次羅睺羅多次僧伽難提次伽耶舍多次鳩摩羅多次闍夜多次婆修盤頭次摩拏羅次鶴勒那次師子已上付法藏傳二十四祖二十五婆舍斯多二十六不如密多二十七般若多羅二十八菩提達磨此是天竺次第相承達磨大師梁朝來東即是震旦禪法始祖次慧可次僧璨次道信五弘忍忍下有神秀慧能二德能禪師南方弘禪名南宗禪秀禪師對彼名北宗禪南北二禪此時始分神秀下有普寂寂公下有道璿璿公日本天平八年丙子傳禪日本住大安寺後住吉野比蘇寺璿公授于行表表公授之于傳教大師如是而來後代睿山不聞弘通南宗惠能下有南嶽懷讓荷澤神會清原山行思等讓之下有馬祖道一次百丈懷海次黃蘗希運及溈山靈祐等祐下有仰山惠寂此師所立名溈仰宗此下有南塔光潒等次第傳敷希運授于臨濟義玄玄公已後名之臨濟宗玄下有興化存獎次南院惠顒次風穴延照次首山省念次汾陽善昭次石霜楚圓次楊岐方會次白雲守端次五祖法演次圜悟克勤禪師及開福道寧等寧公下有大溈善果次大洪祖證次萬壽師觀次護國佛眼禪師次鷲峰覺心禪師也由良開山覺心往唐遇佛眼傳法歸朝弘之圜悟勤下有虎丘紹隆禪師次應庵曇華次密庵咸傑次破庵祖先次徑山師範道號無準日本圓爾入宋值無準禪師稟法歸朝開東福寺大弘所傳清原山行思禪師下有石頭希遷次弘道次惟儼及天皇寺道悟等儼公授法曇晟晟下有洞山良價價下有曹山本寂自此已後名曹洞宗道悟下有崇信次宣鑒次義存次雲門文偃并玄沙宗一也文偃所弘名雲門宗宗一下有桂琮次清涼院文益禪師此師所立名法眼宗人名大法眼禪師故益下有高麗惠炬國師等南宗禪法後代如是五家分派互立門輩故傳法正宗記第七云正宗至大鑒其傳既廣而學者遂各務其師之說天下於是異焉競自為家故有并仰云者有曹洞云者有臨濟云者有雲門云者有法眼云者若此不可悉數而雲門臨濟法眼三家之徒於今尤盛溈仰已熄而曹洞者僅存綿綿然猶大旱之引孤泉然其盛衰者豈法有強弱也蓋後世相承得人與不得人耳書不云乎苟非其人道不虗行已上此中溈仰臨濟二家是南嶽門人餘之三家即清原門流也惠能法子荷澤神會門葉廣榮後代流演會下有無名并智如等無名之下有清涼澄觀大師等智如下有唯忠次遂州道圓次圭峰宗密禪師等南北二禪震旦古來橫竪流通不可勝計北宗中古不聞流行後代基昌唯南禪耳至日本禪宗者北宗昔傳南宗禪法近比榮西圓爾等傳大行世間廣流遐邇唐朝禪法略分五宗一牛頭宗從四祖下傍出法融為始二北宗從五祖下傍出神秀為始三南宗對北宗故能禪師為始初四荷澤宗神會為始五洪州宗南嶽懷讓為始此五宗禪出圭峰拾遺問又同師圓覺疏抄中舉禪師見解惣有七家一北宗禪二智詵禪師見解元出五祖之下三老安和尚宗旨亦在五祖之下四懷讓禪師宗旨五牛頭宗六南山念佛門禪宗元出五祖之下七荷澤宗與前五宗同異有無禪門宗旨元是一味隨解託緣如是有異然其離念無物指體見妙一相無別禪宗梗概要略如是淨土宗夫淨土宗者速出生死之要門直入不退之真戶也清升玄遠無憂惱之名洞朗光顯離癡惑之性土則嚴淨奇麗出三界之道佛則高妙尊特飾萬德之體衆生入者具自然之通明含靈生者備任運之妙相依正之奇建立有由往生之術興起豈虗六八願王彌陀如來運大悲之車迎五濁之蒼生浮宏誓之船度六趣之含靈一代教主釋迦善逝施救濟之慈勉具縛之朦心垂矜愍之恩授最上之教行可謂出離六道之法往生淨土之宗是也此乃符彌陀之願同立厭欣之門合諸佛之意俱開無生之路教主發遣願王來迎彼此相成離得圓備然佛教門惣有二種一娑婆得道教觀二往生淨土教觀前是聖道難行之宗後乃淨土易行之法淨土教觀互通十方各隨所念生彼國故偏指一方令專一故專念彌陀緣純熟故是故諸教多讚彌陀欣往生者所依有據然則十聲一稱速滅生死之罪障六方恆沙深作決定之證明名號則攝萬德於三字利益則超六道於一念得往生已彼土他土受樂獲益不可思議見佛聞法登賢聖之級救生利物作隨應之化光明寶林恆出妙法之音色物金池大播視聽之益諸佛集會塞虗空之中補處充滿預同友之座觸事升進託相趣入十萬億土設供養於清旦塵數世界垂濟度於晡時百千惣持之力諸佛授記之事念念增上新新添益不歷多劫頓入四智之果無經勞苦直至三身之極無相湛然隨類應同居不住之道處莫二之宅盡未來際無方自在淨土宗旨始終如是淨土所依三經一論所謂無量壽經觀無量壽經阿彌陀經淨土論是也無量壽經廣明彌陀願行果利觀經具說定散二善修行得果彌陀經專陳依正念唱往生佛證往生論中取三經意惣明五念因果利益淨土一門所有行果此等經論皆悉攝盡淨土經論傳譯震旦依教立宗依宗獲證最初開淨教者乃廬山惠遠蓮社行人連續不絶東魏之世曇鸞大師遇菩提流支傳受觀經自行化他專依淨教菩提流支中天竺人譯淨土論廣行于世道綽禪師慕鸞舊蹤專弘淨土建興念佛善導即承道綽善導之下懷感法師次立少康為第五祖淨教先德勘高僧傳立此五祖為所依人若加菩提流支即成六祖至後代者大宋之代慈雲法師大智律師建興念佛成辦二利大日本國淨土教行諸宗學者隨應依學近世已來淨教甚昌源空大德建興此教道俗男女無不從化源空門下有幸西一念之義隆寬長樂寺是多念之義證空西山聖光鎮西長西九品寺等俱承源空各弘淨教幸西下有善性勤信等隆寬律師門下有敬日智慶等敬日洛陽播化智慶關東弘教東山慈信稟于敬日慶公下有慶願次信教能念等證空門下有證入證惠淨音隆信等證入下有觀日觀明修觀等聖光門下有然阿焉長西門下有覺心阿彌陀道教上衍證忍等源空門葉如是依學自外諸德出雲路住心上人天台學者生馬良遍法印法相木幡真空上人三論真言知足院悟阿上人律并法相此等未必源空門人竝玩淨教成辦二利淨土教行華夷都鄙依學極多皆是源空上人弘通之力也淨土教義梗概如是夫教門過恆沙義理通法界十大千塵之頌七日窮玄一須彌聚之筆一念罄幽況乎過未無量之劫何況重重帝網之說三乘一乘旨異真性理同一性五性事別實體如等涅槃門廣攝衆生於同性實相道大安諸物於等玄一宗尚嗜未聞況於諸宗義乎但下佛種於身田植覺根於意地乞願聳覺山露湛佛海而已
